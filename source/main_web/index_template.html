<!doctype html>
<html lang="en-us">

<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width">

    <title>{{ TITLE }}</title>
    <meta name="title" content="{{ TITLE }}">

    <style>
        body {
            margin: 0px;
            padding: 0px;
            overflow: hidden;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-width: 100vw;
        }
        canvas.game_canvas {
            border: 0px none;
            background-color: black;
            display: block;
            outline: none;
            -webkit-tap-highlight-color: rgba(255, 255, 255, 0);
            max-width: 100vw;
            max-height: 100vh;
            width: auto;
            height: auto;
            object-fit: contain;
        }
        canvas.game_canvas.cursor_hidden {
            cursor: none;
        }
        #status {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: visible;
        }
        #status.hidden {
            visibility: hidden;
        }
        #status-progress {
            width: 200px;
            height: 8px;
            background-color: white;
            padding: 4px;
            overflow: hidden;
        }
        #status-progress-bar {
            height: 100%;
            background-color: black;
            width: 0%;
            transition: width 0.2s ease;
        }
    </style>
</head>

<body>
    <canvas class="game_canvas" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <div id="status">
        <div id="status-progress">
            <div id="status-progress-bar"></div>
        </div>
    </div>
    <script type="text/javascript" src="odin.js"></script>
    <script>
        // stop arrows / space / pgup-pgdn / home-end from scrolling the
        // page while the game has focus (esp painful when hosted in iframe)
        const SCROLL_KEYS = new Set([
            "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight",
            " ", "Spacebar", "PageUp", "PageDown", "Home", "End"
        ])
        window.addEventListener("keydown", (e) => {
            if (SCROLL_KEYS.has(e.key)) { e.preventDefault() }
        }, { passive: false })
    </script>
    <script>
        // localStorage key for save data
        const SAVE = "__NAME__"

        // file sizes for progress calculation
        const WASM_SIZE = -1
        const ROM_SIZE = -1
        const TOTAL_SIZE = WASM_SIZE + ROM_SIZE

        const enc = new TextEncoder()
        const dec = new TextDecoder()
        const ls = localStorage
        const canvas = document.getElementById('canvas')

        // tag WebGL drawing buffer as display-p3 so explicit RGB values
        // map to display primaries directly. without this, browser treats
        // canvas as sRGB and color-manages to display gamut, dimming pure
        // colors (e.g. (255,0,0) eyedrops as (234,51,35) on P3 monitors).
        const _origGetContext = canvas.getContext.bind(canvas)
        canvas.getContext = (type, attrs) => {
            const ctx = _origGetContext(type, attrs)
            if (ctx && (type === 'webgl2' || type === 'webgl')) {
                try { ctx.drawingBufferColorSpace = 'display-p3' } catch (_) {}
                try { ctx.unpackColorSpace = 'display-p3' } catch (_) {}
            }
            return ctx
        }

        const odinMem = new odin.WasmMemoryInterface()
        odinMem.setIntSize(4)
        const odinImp = odin.setupDefaultImports(odinMem)
        let romData = null

        // expose js functions to odin
        odinImp.expose = {}
        odinImp.expose.web_set_cursor_visible = (yn) => canvas.classList[yn ? 'remove' : 'add']('cursor_hidden')
        odinImp.expose.web_get_rom_size = () => romData ? romData.length : 0
        odinImp.expose.web_load_rom_data = (ptr) => romData ? odinMem.loadBytes(ptr, romData.length).set(romData) : null
        odinImp.expose.web_save_size = () => enc.encode(ls.getItem(SAVE) || "").length
        odinImp.expose.web_save_write = (ptr, len) => ls.setItem(SAVE, dec.decode(odinMem.loadBytes(ptr, len)))
        odinImp.expose.web_save_read = (ptr, s=ls.getItem(SAVE), b=s && enc.encode(s)) => b && odinMem.loadBytes(ptr, b.length).set(b)

        var Module = {
            instantiateWasm: (baseImports, successCallback) => {
                const imports = { ...odinImp, ...baseImports }

                const statusElement = document.getElementById('status')
                const progressBar = document.getElementById('status-progress-bar')
                const loaded = { rom: 0, wasm: 0, total: 0 }

                // { preventScroll: true } stops the parent page (or
                // containing iframe) from auto-scrolling the canvas
                // into view on focus
                function focusCanvas() { canvas.focus({ preventScroll: true }) }

                function updateProgress() {
                    const progress = (loaded.total / TOTAL_SIZE) * 100
                    progressBar.style.width = `${progress}%`
                }

                function makeStreamer(which) {
                    return response => {
                        if (!response.ok) { throw new Error(`Failed to fetch cart: ${response.status}`) }
                        const reader = response.body.getReader()
                        const stream = new ReadableStream({
                            start(controller) {
                                function pump() {
                                    return reader.read().then(({ done, value }) => {
                                        if (done) {
                                            totalLoaded = TOTAL_SIZE
                                            updateProgress()
                                            controller.close()
                                            return
                                        }

                                        loaded[which] += value.byteLength
                                        loaded.total = loaded.rom + loaded.wasm
                                        updateProgress()

                                        controller.enqueue(value)
                                        return pump()
                                    })
                                }
                                return pump()
                            }
                        })
                        return new Response(stream, { headers: response.headers })
                    }
                }

                const romFetch = fetch("cart.m9").then(makeStreamer("rom")).then(async response =>
                    romData = new Uint8Array(await response.arrayBuffer())
                )

                const wasmFetch = fetch("index.wasm").then(makeStreamer("wasm")).then(response =>
                    WebAssembly.instantiateStreaming(response, imports)
                )

                Promise.all([romFetch, wasmFetch]).then(([_, output]) => {
                    const e = output.instance.exports
                    odinMem.setExports(e)
                    odinMem.setMemory(e.memory)
                    successCallback(output.instance)

                    // calls any procedure marked with @init
                    e._start()

                    // see source/main_web/main_web.odin for main_start,
                    // main_update and main_end.
                    e.main_start()

                    function send_resize() {
                        e.web_window_size_changed(window.innerWidth, window.innerHeight)
                        setTimeout(focusCanvas, 100)
                    }

                    window.addEventListener('resize', (event) => send_resize(), true)

                    // also regain focus on fullscreen changes
                    document.addEventListener('fullscreenchange', () => setTimeout(focusCanvas, 100))

                    // and on any click in the document (for itch.io UI interactions)
                    document.addEventListener('click', () => setTimeout(focusCanvas, 50))

                    // this can probably be done better: ideally we'd feed the
                    // initial size to `main_start`. but there seems to be a
                    // race condition. `canvas` doesn't have it's correct size yet.
                    send_resize()

                    // runs the "main loop".
                    function do_main_update() {
                        if (!e.main_update()) {
                            e.main_end()

                            // calls procedures marked with @fini
                            e._end()
                            return
                        }
                        window.requestAnimationFrame(do_main_update)
                    }

                    window.requestAnimationFrame(do_main_update)

                    // focus the canvas for keyboard input
                    focusCanvas()

                    // hide loading screen
                    statusElement.classList.add('hidden')

                    return output.instance.exports
                });
            },
            print: (function () {
                return function (text) {
                    if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ')
                    console.log(text)
                }
            })(),
            canvas: (function () {
                return document.getElementById("canvas")
            })()
        }
    </script>

    {{{ SCRIPT }}}
</body>

</html>
